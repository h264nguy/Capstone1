
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Live Machine Display</title>
<style>
body{background:#0e0e0e;color:white;font-family:Arial;text-align:center}
.bmo{
width:420px;height:420px;margin:40px auto;background:#8ad0c3;border-radius:40px;
display:flex;align-items:center;justify-content:center;position:relative;
animation:float 3s ease-in-out infinite;
}
.eye{width:28px;height:90px;background:#0d2430;border-radius:20px;margin:0 40px;animation:blink 5s infinite}
.face{display:flex}
.mouth{width:70px;height:70px;background:#0d2430;border-radius:50%;margin:auto;margin-top:30px}
.status{font-size:28px;margin-top:20px}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}
@keyframes blink{0%,95%,100%{transform:scaleY(1)}97%{transform:scaleY(.1)}}
</style>
</head>
<body>
<h1>LIVE MACHINE DISPLAY</h1>

<div class="bmo">
<div>
<div class="face">
<div class="eye"></div>
<div class="eye"></div>
</div>
<div class="mouth"></div>
</div>
</div>

<div class="status" id="status">Waiting for orders</div>

<script>
async function update(){
try{
let r=await fetch("/api/live-status")
let d=await r.json()
if(!d.active){
document.getElementById("status").innerText="Waiting for orders"
}else{
document.getElementById("status").innerText="Pouring "+d.ingredient
}
}catch(e){}
}
setInterval(update,1000)
</script>

</body>
</html>
