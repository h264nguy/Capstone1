<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Machine Display</title>
  <style>
    *{box-sizing:border-box}
    :root{
      --cream:#f7ead6; --soft:#eadcc7; --glass:rgba(17,11,8,.60); --line:rgba(247,234,214,.18);
      --bg:#090604; --cyan:#86ddff; --green:#9df07c;
    }
    html,body{height:100%}
    body{margin:0;font-family:Inter,Arial,sans-serif;color:var(--cream);background:linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.48)),url('/static/background-1.png') center/cover fixed no-repeat,var(--bg)}
    .wrap{min-height:100%;display:grid;grid-template-columns:1.25fr .75fr;gap:24px;padding:24px}
    .panel{background:var(--glass);border:1px solid var(--line);border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,.35);backdrop-filter:blur(12px)}
    .hero{padding:28px;display:grid;grid-template-rows:auto auto 1fr auto;min-height:0}
    .side{padding:22px;display:grid;grid-template-rows:auto auto 1fr;min-height:0}
    .title{font-size:clamp(24px,2.7vw,40px);font-weight:900;letter-spacing:.08em;text-transform:uppercase}
    .sub{opacity:.82;margin-top:8px;font-size:15px}
    .statusPill{display:inline-flex;align-items:center;gap:10px;margin-top:18px;padding:10px 16px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-weight:800;letter-spacing:.08em;text-transform:uppercase;width:max-content}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 14px var(--green)}
    .machineZone{display:grid;grid-template-columns:1.05fr .95fr;gap:20px;align-items:center}
    .bmoBox{display:grid;place-items:center;min-height:420px}
    .bmo{width:min(92%,430px);aspect-ratio:.84;position:relative;border-radius:34px;padding:26px;background:linear-gradient(180deg,#99dac5,#70c6ad);box-shadow:inset 0 -12px 0 rgba(0,0,0,.08),0 18px 45px rgba(0,0,0,.35);animation:floaty 3.8s ease-in-out infinite}
    .screen{position:relative;height:58%;border-radius:22px;background:#d0f0e5;border:5px solid rgba(0,0,0,.09);overflow:hidden}
    .face{position:absolute;inset:0;display:grid;place-items:center}
    .eyes{display:flex;gap:58px;margin-top:-30px}.eye{width:18px;height:42px;border-radius:999px;background:#111;transition:.25s ease}.mouth{width:88px;height:42px;border:6px solid #111;border-top:none;border-left:none;border-right:none;border-radius:0 0 70px 70px;margin:22px auto 0;transition:.25s ease}
    .face.idle .eye{animation:blink 4s infinite}.face.working .mouth{width:70px;height:18px;border:none;background:#111;border-radius:999px}.face.celebrate .eye{height:14px;width:42px;border-radius:999px}.face.celebrate .mouth{width:108px;height:58px;border-width:8px}
    .bodyBtns{display:flex;gap:14px;margin-top:18px;align-items:center}.bodyBtn,.dpad{border-radius:999px;background:rgba(0,0,0,.16)}.bodyBtn{width:22px;height:22px}.dpad{width:66px;height:66px;position:relative}.dpad:before,.dpad:after{content:"";position:absolute;background:rgba(0,0,0,.26);left:50%;top:50%;transform:translate(-50%,-50%)}.dpad:before{width:16px;height:56px;border-radius:10px}.dpad:after{width:56px;height:16px;border-radius:10px}
    .infoCard{padding:22px;border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.04)}
    .drink{font-size:clamp(24px,3vw,42px);font-weight:900;line-height:1.05;margin-top:8px}
    .metaGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}.mini{padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--line)}.miniLabel{font-size:12px;letter-spacing:.12em;text-transform:uppercase;opacity:.75;font-weight:700}.miniValue{font-size:26px;font-weight:900;margin-top:4px}
    .progressWrap{margin-top:18px}.bar{height:18px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;border:1px solid rgba(255,255,255,.06)}.fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),#e4f8ff);box-shadow:0 0 22px rgba(134,221,255,.5);transition:width .45s linear}.stepRow{display:flex;justify-content:space-between;gap:12px;margin-top:10px;font-weight:700}
    .ingredientNow{margin-top:18px;padding:18px;border-radius:20px;border:1px solid rgba(134,221,255,.25);background:rgba(134,221,255,.08)}.ingredientNow .label{opacity:.8;text-transform:uppercase;letter-spacing:.12em;font-size:12px;font-weight:700}.ingredientNow .value{margin-top:6px;font-size:28px;font-weight:900}
    .celebrateBanner{margin-top:18px;padding:16px 18px;border-radius:20px;background:rgba(157,240,124,.12);border:1px solid rgba(157,240,124,.28);font-weight:800;display:none}
    .queueTitle{font-size:22px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.queueList{margin-top:18px;overflow:auto;min-height:0;padding-right:6px}.queueCard{padding:16px 18px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid var(--line);margin-bottom:12px}.queueCard.active{border-color:rgba(134,221,255,.35);box-shadow:0 0 0 1px rgba(134,221,255,.12),0 0 28px rgba(134,221,255,.12)}.qTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.qName{font-weight:900;font-size:20px}.qMeta{margin-top:6px;opacity:.82;line-height:1.45}.clock{opacity:.72;font-size:13px;margin-top:8px}
    .empty{display:grid;place-items:center;height:100%;text-align:center;opacity:.92;padding:24px}.emptyBig{font-size:30px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.emptySmall{margin-top:10px;line-height:1.5;max-width:340px}
    @keyframes blink{0%,45%,47%,100%{transform:scaleY(1)}46%{transform:scaleY(.08)}} @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @media (max-width:980px){.wrap{grid-template-columns:1fr}.machineZone{grid-template-columns:1fr}.bmoBox{min-height:280px}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel hero">
      <div>
        <div class="title">Live Machine Display</div>
        <div class="sub">Real-time view of the current drink, active step, ingredient in progress, and queue.</div>
        <div class="statusPill"><span class="dot"></span><span id="statusText">Waiting for orders</span></div>
      </div>

      <div class="machineZone">
        <div class="bmoBox">
          <div class="bmo">
            <div class="screen">
              <div id="face" class="face idle">
                <div>
                  <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                  <div class="mouth"></div>
                </div>
              </div>
            </div>
            <div class="bodyBtns">
              <div class="dpad"></div>
              <div class="bodyBtn"></div>
              <div class="bodyBtn"></div>
            </div>
          </div>
        </div>

        <div class="infoCard">
          <div class="miniLabel">Now making</div>
          <div id="drinkName" class="drink">No active drink</div>

          <div class="metaGrid">
            <div class="mini"><div class="miniLabel">Step</div><div id="stepText" class="miniValue">0/0</div></div>
            <div class="mini"><div class="miniLabel">ETA</div><div id="etaText" class="miniValue">--s</div></div>
          </div>

          <div class="progressWrap">
            <div class="bar"><div id="progressFill" class="fill"></div></div>
            <div class="stepRow"><span id="progressLabel">Idle</span><span id="positionLabel">Queue empty</span></div>
          </div>

          <div class="ingredientNow">
            <div class="label">Current ingredient</div>
            <div id="ingredientText" class="value">Waiting...</div>
          </div>

          <div id="celebrateBanner" class="celebrateBanner">Yay! Your drink has been completed.</div>
          <div id="clock" class="clock">Last refresh: --</div>
        </div>
      </div>
    </section>

    <aside class="panel side">
      <div>
        <div class="queueTitle">Drink Queue</div>
        <div class="sub"><span id="queueCount">0</span> active drink(s)</div>
      </div>
      <div></div>
      <div id="queueList" class="queueList"></div>
    </aside>
  </div>

  <script>
    function fmtSec(s){
      s = Number.isFinite(s) ? Math.max(0, Math.round(s)) : 0;
      const m = Math.floor(s/60), r = s%60;
      if(m > 0) return `${m}m ${String(r).padStart(2,'0')}s`;
      return `${r}s`;
    }
    function esc(v){ return String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

    function renderEmpty(lastDone){
      document.getElementById('statusText').textContent = 'Waiting for orders';
      document.getElementById('drinkName').textContent = 'No active drink';
      document.getElementById('stepText').textContent = '0/0';
      document.getElementById('etaText').textContent = '--s';
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('progressLabel').textContent = 'Idle';
      document.getElementById('positionLabel').textContent = 'Queue empty';
      document.getElementById('ingredientText').textContent = 'Waiting...';
      document.getElementById('face').className = 'face idle';
      const banner = document.getElementById('celebrateBanner');
      if(lastDone){
        banner.style.display = 'block';
        banner.textContent = `Yay! ${lastDone.drinkName} was completed ${fmtSec(lastDone.secondsAgo)} ago.`;
        document.getElementById('face').className = 'face celebrate';
      } else {
        banner.style.display = 'none';
      }
    }

    function renderCurrent(cur, lastDone){
      document.getElementById('statusText').textContent = cur.status === 'In Progress' ? 'Machine is making a drink' : 'Next drink is queued';
      document.getElementById('drinkName').textContent = cur.drinkName || 'Drink';
      document.getElementById('stepText').textContent = `${cur.step || 0}/${cur.totalSteps || 0}`;
      document.getElementById('etaText').textContent = fmtSec(cur.etaThisSeconds ?? cur.etaSeconds ?? 0);
      document.getElementById('progressFill').style.width = `${Math.max(0, Math.min(100, cur.progressPercent || 0))}%`;
      document.getElementById('progressLabel').textContent = cur.status === 'In Progress' ? `Progress ${Math.round(cur.progressPercent || 0)}%` : 'Waiting to start';
      document.getElementById('positionLabel').textContent = cur.position ? `Queue position #${cur.position}` : 'Queue position --';
      document.getElementById('ingredientText').textContent = cur.currentIngredient || 'Mixing';
      document.getElementById('face').className = cur.status === 'In Progress' ? 'face working' : 'face idle';
      const banner = document.getElementById('celebrateBanner');
      if(lastDone){
        banner.style.display = 'block';
        banner.textContent = `Yay! ${lastDone.drinkName} was completed ${fmtSec(lastDone.secondsAgo)} ago.`;
      } else {
        banner.style.display = 'none';
      }
    }

    function renderQueue(list){
      const holder = document.getElementById('queueList');
      document.getElementById('queueCount').textContent = String(list.length || 0);
      if(!list.length){
        holder.innerHTML = `<div class="empty"><div><div class="emptyBig">No drinks in queue</div><div class="emptySmall">The machine is ready. New orders will appear here automatically.</div></div></div>`;
        return;
      }
      holder.innerHTML = list.map((item, idx) => `
        <div class="queueCard ${idx===0 ? 'active' : ''}">
          <div class="qTop">
            <div>
              <div class="qName">${esc(item.drinkName || 'Drink')}</div>
              <div class="qMeta">Status: ${esc(item.status || 'Pending')}<br>Step: ${item.step || 0}/${item.totalSteps || 0}<br>Ingredient: ${esc(item.currentIngredient || 'Mixing')}</div>
            </div>
            <div class="qMeta">ETA: ${fmtSec(item.etaThisSeconds ?? item.etaSeconds ?? 0)}<br>Pos: #${item.position || (idx+1)}</div>
          </div>
        </div>
      `).join('');
    }

    async function tick(){
      try{
        const res = await fetch('/api/live-display', {cache:'no-store'});
        const data = await res.json();
        if(!data.ok) throw new Error('Bad response');
        renderQueue(data.queue || []);
        if(data.current) renderCurrent(data.current, data.lastDone);
        else renderEmpty(data.lastDone);
        document.getElementById('clock').textContent = `Last refresh: ${new Date().toLocaleTimeString()}`;
      }catch(err){
        document.getElementById('statusText').textContent = 'Connection issue';
        document.getElementById('clock').textContent = 'Live refresh failed';
      }
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
