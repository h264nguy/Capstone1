<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BMO Fullscreen Display</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#040506;
      --cream:#f7ead6;
      --line:rgba(247,234,214,.16);
      --green:#9eff79;
      --cyan:#1df0dc;
      --orange:#ff981f;
      --screen1:#bff5ea;
      --screen2:#93ddcb;
      --screen3:#7bcdb8;
      --shadow:rgba(0,0,0,.35);
    }
    html,body{
      width:100%;height:100%;margin:0;overflow:hidden;
      background:
        radial-gradient(circle at 20% 16%, rgba(19,55,60,.55) 0%, rgba(7,10,12,0) 30%),
        radial-gradient(circle at 82% 18%, rgba(15,88,80,.22) 0%, rgba(7,10,12,0) 26%),
        radial-gradient(circle at 50% 50%, #0a1113 0%, #040506 60%, #010101 100%);
      font-family: Inter, Arial, sans-serif;
      color:var(--cream);
    }
    body:before, body:after{
      content:"";position:fixed;pointer-events:none;opacity:.2;filter:blur(1px)
    }
    body:before{
      left:-12vw;bottom:-8vh;width:48vw;height:26vh;border:10px solid rgba(255,152,31,.55);
      border-radius:45% 55% 48% 52%/65% 45% 55% 35%;transform:rotate(-8deg)
    }
    body:after{
      right:-8vw;top:-4vh;width:42vw;height:40vw;border:10px solid rgba(29,240,220,.38);
      border-radius:50%
    }

    .scene{
      position:relative;width:100vw;height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
    }

    .orbit,.orbit2,.orbit3{
      position:absolute;border-radius:50%;pointer-events:none;
      border:8px solid rgba(29,240,220,.18);filter:blur(.4px)
    }
    .orbit{width:56vw;height:18vw;top:10vh;left:10vw;transform:rotate(8deg);animation:drift 12s ease-in-out infinite}
    .orbit2{width:34vw;height:12vw;right:8vw;bottom:13vh;border-color:rgba(29,240,220,.24);transform:rotate(-12deg);animation:drift 9s ease-in-out infinite reverse}
    .orbit3{width:26vw;height:10vw;left:-3vw;bottom:8vh;border-color:rgba(255,152,31,.28);transform:rotate(-9deg);animation:drift 10s ease-in-out infinite}

    .bubble{
      position:absolute;top:8vh;right:9vw;
      max-width:min(34vw,520px);
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      box-shadow:0 18px 40px rgba(0,0,0,.24);
      border-radius:999px;
      padding:18px 26px;
      font-size:clamp(20px,1.9vw,36px);
      font-weight:800;
      line-height:1.15;
      opacity:0;transform:translateY(10px) scale(.98);
      transition:opacity .25s ease, transform .25s ease;
      backdrop-filter:blur(8px);
      text-align:center;
      z-index:3;
    }
    .bubble.show{opacity:1;transform:translateY(0) scale(1)}

    .bmoWrap{
      position:relative;
      width:min(72vw,900px);
      aspect-ratio:.78;
      display:flex;align-items:center;justify-content:center;
    }
    .bmoShadow{
      position:absolute;bottom:4%;left:50%;transform:translateX(-50%);
      width:55%;height:6%;border-radius:50%;background:rgba(0,0,0,.35);filter:blur(18px)
    }
    .bmo{
      position:relative;width:100%;height:100%;
      border-radius:48px;
      background:linear-gradient(180deg, #8bdcc7 0%, #76c7af 100%);
      box-shadow:
        inset 0 -12px 0 rgba(0,0,0,.08),
        0 24px 60px rgba(0,0,0,.36);
      padding:4.8% 4.8% 3.8%;
      animation:floaty 4.6s ease-in-out infinite;
    }
    .screen{
      position:relative;height:63%;border-radius:34px;
      background:linear-gradient(180deg,var(--screen1),var(--screen2));
      border:7px solid rgba(0,0,0,.08);
      box-shadow:inset 0 -10px 0 rgba(0,0,0,.05);
      overflow:hidden;
    }
    .screenGlow{
      position:absolute;inset:0;
      background:
        radial-gradient(circle at 50% 28%, rgba(255,255,255,.18), rgba(255,255,255,0) 42%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
      pointer-events:none;
    }

    .face{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      transition:transform .25s ease;
    }
    .faceInner{
      position:relative;width:62%;height:44%;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10%;
    }
    .eyes{
      display:flex;gap:20%;align-items:center;justify-content:center;width:62%;
      margin-top:2%;
    }
    .eye{
      width:11%;height:28%;min-width:20px;min-height:52px;
      background:#111;border-radius:999px;
      transition:transform .18s ease, height .18s ease, width .18s ease, border-radius .18s ease;
    }
    .mouthWrap{
      width:34%;height:26%;display:flex;align-items:flex-start;justify-content:center;
      overflow:visible;
    }
    .mouth{
      width:100%;height:22px;border:6px solid #111;border-top:none;
      border-radius:0 0 100px 100px;transform-origin:center top;
      transition:all .18s ease;background:transparent;
    }
    .blush{
      position:absolute;top:42%;width:10%;height:6%;border-radius:50%;
      background:rgba(255,152,170,.16);filter:blur(2px);opacity:.65
    }
    .blush.left{left:15%}
    .blush.right{right:15%}

    .bmoBottom{
      height:37%;position:relative;
    }
    .dpad{
      position:absolute;left:7%;bottom:24%;
      width:15%;aspect-ratio:1;border-radius:50%;
      background:rgba(20,40,45,.14);
      box-shadow:inset 0 0 0 2px rgba(0,0,0,.03);
    }
    .dpad:before,.dpad:after{
      content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
      background:rgba(35,45,48,.26);border-radius:14px
    }
    .dpad:before{width:62%;height:16%}
    .dpad:after{width:16%;height:62%}
    .btns{
      position:absolute;right:8%;bottom:27%;display:flex;gap:10%;
      width:14%;justify-content:flex-end
    }
    .btnA,.btnB{width:26%;aspect-ratio:1;border-radius:50%;background:rgba(20,40,45,.18)}

    /* Face states */
    .idle .mouth{height:18px;width:94%;border-width:6px}
    .idle.look-left .faceInner{transform:translateX(-3%)}
    .idle.look-right .faceInner{transform:translateX(3%)}
    .idle.wink .eye:first-child{height:8px;border-radius:999px}
    .idle.wink .eye:last-child{transform:translateY(1px)}
    .idle.smile-big .mouth{height:34px;width:110%}
    .idle.surprised .mouth{
      width:22%;height:26px;border:6px solid #111;border-radius:50%;border-top:6px solid #111
    }

    .working .faceInner{transform:translateY(-1%)}
    .working .eye{height:24%;width:12%;border-radius:999px 999px 10px 10px;transform:rotate(8deg)}
    .working .eye:last-child{transform:rotate(-8deg)}
    .working .mouth{
      width:70%;height:4px;border:none;background:#111;border-radius:999px;margin-top:6%
    }

    .happy .eye{
      height:8px;width:14%;border-radius:999px;background:#111
    }
    .happy .mouth{
      width:112%;height:38px;border-width:7px
    }
    .happy .faceInner{transform:translateY(-1%) scale(1.03)}

    .celebrate{
      animation:bouncey 1s ease-in-out infinite alternate;
    }

    .statusText{
      position:absolute;left:50%;bottom:5vh;transform:translateX(-50%);
      text-align:center;z-index:3;
      font-size:clamp(20px,1.8vw,32px);font-weight:900;letter-spacing:.08em;text-transform:uppercase;
      opacity:.92;text-shadow:0 2px 20px rgba(0,0,0,.35)
    }
    .subText{
      margin-top:8px;font-size:clamp(14px,1.1vw,20px);font-weight:700;letter-spacing:.02em;text-transform:none;opacity:.82
    }

    @keyframes floaty{
      0%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
      100%{transform:translateY(0)}
    }
    @keyframes bouncey{
      from{transform:translateY(0) scale(1)}
      to{transform:translateY(-10px) scale(1.015)}
    }
    @keyframes drift{
      0%,100%{transform:translateY(0) rotate(8deg)}
      50%{transform:translateY(-8px) rotate(6deg)}
    }

    @media (max-aspect-ratio: 4/3){
      .bmoWrap{width:min(88vw,860px)}
      .bubble{right:50%;transform:translateX(50%) translateY(10px) scale(.98);top:6vh;max-width:86vw}
      .bubble.show{transform:translateX(50%) translateY(0) scale(1)}
      .statusText{bottom:6vh;width:90vw}
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="orbit"></div>
    <div class="orbit2"></div>
    <div class="orbit3"></div>

    <div id="speechBubble" class="bubble">Hehe... I’m ready!</div>

    <div class="bmoWrap">
      <div class="bmoShadow"></div>
      <div class="bmo" id="bmoUnit">
        <div class="screen">
          <div class="screenGlow"></div>
          <div id="face" class="face idle">
            <div class="faceInner">
              <div class="blush left"></div>
              <div class="blush right"></div>
              <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
              <div class="mouthWrap"><div class="mouth"></div></div>
            </div>
          </div>
        </div>
        <div class="bmoBottom">
          <div class="dpad"></div>
          <div class="btns"><div class="btnA"></div><div class="btnB"></div></div>
        </div>
      </div>
    </div>

    <div class="statusText">
      <div id="modeText">Waiting for orders</div>
      <div id="subText" class="subText">BMO is hanging out and playing on screen.</div>
    </div>
  </div>

  <script>
    const faceEl = document.getElementById('face');
    const bubble = document.getElementById('speechBubble');
    const modeText = document.getElementById('modeText');
    const subText = document.getElementById('subText');

    let idleTimer = null;
    let prevCurrentId = null;
    let lastDoneKey = null;
    let lastState = 'idle';

    function speak(text){
      try{
        if(!('speechSynthesis' in window) || !text) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 1.04;
        u.pitch = 1.45;
        u.volume = 1;
        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v => /samantha|ava|victoria|karen|moira/i.test(v.name)) || voices.find(v => /^en/i.test(v.lang));
        if(preferred) u.voice = preferred;
        window.speechSynthesis.speak(u);
      }catch(e){}
    }

    function showBubble(text, ms=2400){
      bubble.textContent = text || '';
      bubble.classList.add('show');
      clearTimeout(showBubble._t);
      showBubble._t = setTimeout(() => bubble.classList.remove('show'), ms);
    }

    function setFace(mode, extra=''){
      faceEl.className = `face ${mode}${extra ? ' ' + extra : ''}`;
      lastState = mode;
    }

    function startIdlePlay(){
      clearInterval(idleTimer);
      setFace('idle');
      modeText.textContent = 'Waiting for orders';
      subText.textContent = 'BMO is hanging out and playing on screen.';
      const moods = ['', 'look-left', 'look-right', 'wink', 'smile-big', 'surprised'];
      const lines = [
        'Hehe... I’m ready!',
        'Bleep bloop... waiting!',
        'Hi friend!',
        'Order up?',
        'La la la...'
      ];
      let i = 0;
      showBubble(lines[0], 1800);
      idleTimer = setInterval(() => {
        i = (i + 1) % moods.length;
        setFace('idle', moods[i]);
        if(Math.random() > 0.48){
          showBubble(lines[Math.floor(Math.random() * lines.length)], 1800);
        }
      }, 2200);
    }

    function showWorking(current){
      clearInterval(idleTimer);
      setFace('working');
      modeText.textContent = 'Making drink';
      subText.textContent = current && current.drinkName ? current.drinkName : 'Preparing your order';
      if(prevCurrentId !== String((current && (current.id || current.drinkName)) || '')){
        showBubble('Working on your drink!', 1800);
      }
    }

    function showCompleted(lastDone){
      clearInterval(idleTimer);
      setFace('happy celebrate');
      modeText.textContent = 'Drink completed';
      subText.textContent = lastDone && lastDone.drinkName ? lastDone.drinkName : 'Your drink is ready';
      showBubble('Yay, your drink has been completed.', 3600);
      speak('Yay, your drink has been completed.');
    }

    async function tick(){
      try{
        const res = await fetch('/api/live-display', {cache:'no-store'});
        const data = await res.json();
        if(!data.ok) throw new Error('Bad response');

        const current = data.current || null;
        const done = data.lastDone || null;
        const currentId = current ? String(current.id || current.drinkName || '') : null;
        const doneKey = done ? `${done.drinkName || ''}-${done.secondsAgo || 0}` : null;

        if(done && done.secondsAgo <= 10 && doneKey !== lastDoneKey){
          lastDoneKey = doneKey;
          prevCurrentId = null;
          showCompleted(done);
          return;
        }

        if(current){
          prevCurrentId = currentId;
          showWorking(current);
          return;
        }

        prevCurrentId = null;
        if(lastState !== 'idle'){
          startIdlePlay();
        } else if(!idleTimer){
          startIdlePlay();
        }
      }catch(err){
        modeText.textContent = 'Waiting for orders';
        subText.textContent = 'Connection issue. BMO is still hanging out.';
        if(!idleTimer) startIdlePlay();
      }
    }

    if('speechSynthesis' in window){ window.speechSynthesis.getVoices(); }
    startIdlePlay();
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
